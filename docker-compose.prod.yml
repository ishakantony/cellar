# Production deployment for Cellar
#
# Images are pulled from Docker Hub — nothing is built on the server.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values.
#   2. Make sure all tags have been pushed to Docker Hub:
#        ishakantony/cellar:latest     — the app (runner stage)
#        ishakantony/cellar:migrate    — migration + auth sync runner (migrate stage)
#        ishakantony/cellar-ui:latest  — storybook UI (storybook stage)
#
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cellar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cellar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cellar} -d ${POSTGRES_DB:-cellar}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ishakantony/cellar:migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cellar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cellar}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  auth-sync-clients:
    image: ishakantony/cellar:migrate
    command: npm run auth:sync-clients
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cellar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cellar}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  app:
    image: ishakantony/cellar:latest
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cellar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cellar}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?Set GITHUB_CLIENT_ID in .env}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?Set GITHUB_CLIENT_SECRET in .env}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    volumes:
      - uploads:/app/uploads
    depends_on:
      auth-sync-clients:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  storybook:
    image: ishakantony/cellar-ui:latest
    restart: unless-stopped
    ports:
      - '${STORYBOOK_PORT:-6006}:3000'

volumes:
  pgdata:
  uploads:
