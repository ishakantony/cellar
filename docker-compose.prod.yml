# Production deployment for Cellar
#
# One image. Hono serves both the API and the SPA from apps/web/dist.
# On boot it runs migrations, seeds the demo user (if empty), syncs OIDC
# clients (if their secrets are set), prints the startup report, then listens.
#
# Usage:
#   1. Copy .env.example to .env and fill in required values.
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cellar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cellar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cellar} -d ${POSTGRES_DB:-cellar}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ishakantony/cellar:latest
    restart: unless-stopped
    ports:
      - '${PORT:-5200}:5200'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cellar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cellar}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:5200}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:5200}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OIDC_DUMMY_APP_OIDC_SECRET: ${OIDC_DUMMY_APP_OIDC_SECRET:-}
      OIDC_DISABLE_MISSING_CLIENTS: ${OIDC_DISABLE_MISSING_CLIENTS:-false}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
